<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enviar Pedido de Impresión Inteligente</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --bg-main: #1a1423;
            --panel-bg: #2d1f3d;
            --text-dark: #fdf4ff;
            --text-muted: #c4b5d4;
            --brand-color: #fb923c;
            --brand-hover: #f97316;
            --success-color: #10b981;
            --border-color: #4a3a5c;
            --ai-color: #f472b6;
            --input-bg: #1a1423;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        h2 {
            margin: 0 0 5px 0;
            text-align: center;
            color: var(--brand-color);
            font-size: 1.4rem;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        input, select {
            height: 50px;
            padding: 0 14px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            background-color: var(--input-bg);
            color: #ffffff;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--brand-color);
        }

        input:disabled, select:disabled {
            background-color: #1a1423 !important;
            border-color: #475569 !important;
            color: #e2e8f0 !important;
            cursor: not-allowed;
            opacity: 0.9;
        }

        .ai-upload-zone {
            border: 2px dashed var(--ai-color);
            background: linear-gradient(180deg, #4a1d52 0%, #2d1f3d 100%);
            padding: 24px 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .ai-upload-zone:active {
            transform: scale(0.98);
            background: #4a1d52;
        }

        .ai-status {
            font-size: 0.9rem;
            color: var(--success-color);
            font-weight: 700;
            margin-top: 10px;
            display: none;
            padding: 6px;
            border-radius: 6px;
            background-color: rgba(16, 185, 129, 0.1);
        }

        .box-cotizacion {
            background: linear-gradient(135deg, #1a1423 0%, #3d2150 100%);
            border: 1px solid var(--brand-color);
            color: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin: 20px 0;
        }

        .box-cotizacion .precio {
            font-size: 2.4rem;
            font-weight: 900;
            margin-top: 4px;
            color: #fbbf24;
            text-shadow: 0 2px 10px rgba(251, 191, 36, 0.25);
        }

        .btn-enviar {
            width: 100%;
            height: 54px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-enviar:active {
            transform: translateY(1px);
            background-color: #059669;
        }

        .btn-enviar:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #334155;
            border-top: 5px solid var(--ai-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-text {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            padding: 0 20px;
        }

        .btn-audio-flotante {
            position: fixed;
            bottom: 22px;
            right: 22px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--brand-color);
            color: white;
            border: 3px solid #fdba74;
            font-size: 1.6rem;
            cursor: grab;
            box-shadow: 0 6px 16px rgba(251, 146, 60, 0.5);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flotarPulso 2.2s ease-in-out infinite;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }

        .btn-audio-flotante:active { cursor: grabbing; }

        .btn-audio-flotante.arrastrando {
            animation: none;
            transition: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .btn-audio-flotante.hablando {
            background-color: var(--success-color);
            border-color: #6ee7b7;
            animation: hablandoPulso 0.8s ease-in-out infinite;
        }

        @keyframes flotarPulso {
            0%, 100% { box-shadow: 0 6px 16px rgba(251, 146, 60, 0.5); }
            50% { box-shadow: 0 6px 22px rgba(251, 146, 60, 0.9), 0 0 0 8px rgba(251, 146, 60, 0.15); }
        }

        @keyframes hablandoPulso {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loaderGlobal" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">🤖 Analizando estructura del archivo...<br><span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 400;">Extrayendo páginas y calculando costos en tiempo real.</span></div>
</div>

<div class="container">
    <h2>Pedir Impresiones en Línea 🤖</h2>
    <div class="subtitle">Subí tu archivo para cotización automática instantánea</div>

    <form id="formPedido" onsubmit="event.preventDefault(); enviarPedidoALaNube();">
        <div class="form-group">
            <label for="cliente">Tu Nombre Completo</label>
            <input type="text" id="cliente" placeholder="Ej: Juan Pérez" required>
        </div>

        <div class="ai-upload-zone" onclick="document.getElementById('archivoDocumento').click()">
            <span style="font-size: 2.2rem;">📄</span>
            <p style="margin: 6px 0 2px 0; font-weight: 700; color: #f472b6; font-size: 1.1rem;">Cargar Documento o Foto</p>
            <span style="font-size: 0.8rem; color: var(--text-muted);">Soporta: PDF, Word, Excel, PowerPoint o Imágenes</span>
            <input type="file" id="archivoDocumento" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.jpg,.jpeg,.png" style="display: none;" onchange="analizarArchivoNativo(event)">
            <div id="statusIA" class="ai-status"></div>
        </div>

        <div class="form-group">
            <label for="cantidad">¿Cuántas páginas tiene?</label>
            <input type="number" id="cantidad" value="0" min="0" required oninput="calcularCotizacion()">
        </div>

        <div class="form-group">
            <label for="tipoImpresion">Color / Tipo de Trabajo</label>
            <select id="tipoImpresion" onchange="calcularCotizacion()">
                <option value="bn">Blanco y Negro (Monocromático) [₡75]</option>
                <option value="color">A Color (Texto con gráficos) [₡150]</option>
            </select>
        </div>

        <div class="box-cotizacion">
            <div id="labelCotizacion">Monto Estimado a Pagar:</div>
            <div class="precio" id="totalCotizado">₡0</div>
        </div>

        <button type="submit" id="btnEnviar" class="btn-enviar">🚀 Enviar Pedido Digital</button>
    </form>
</div>

<button type="button" id="btnAudioBienvenida" class="btn-audio-flotante">
    🔊
</button>

<script>
    // ✂️ SE ELIMINÓ LA TARIFA DE FOTO DE ₡300
    const TARIFAS = {
        bn:    { minorista: 75,  mediano: 60,  mayorista: 40, label: "Blanco y Negro" },
        color: { minorista: 150, mediano: 125, mayorista: 100, label: "A Color" }
    };

    const JSONBIN_CONFIG = {
        apiKey: "$2a$10$1CT.ODZkwNBUJcZSXiTDtOOWvxmICADU586t6f4V42I5xXSB5UJ9q",
        binId: "6a34965fda38895dfedab1b3" 
    };

    let totalGlobal = 0;

    function calcularCotizacion() {
        const cantidadInput = document.getElementById('cantidad');
        const cantidad = parseFloat(cantidadInput.value) || 0;
        const tipo = document.getElementById('tipoImpresion').value;

        if (cantidad <= 0) {
            document.getElementById('totalCotizado').textContent = "₡0";
            totalGlobal = 0;
            return;
        }

        let precioUnitario = (cantidad < 25) ? TARIFAS[tipo].minorista : (cantidad < 100) ? TARIFAS[tipo].mediano : TARIFAS[tipo].mayorista;
        totalGlobal = precioUnitario * cantidad;
        totalGlobal = Math.ceil(totalGlobal / 5) * 5; 

        document.getElementById('totalCotizado').textContent = "₡" + totalGlobal.toLocaleString('es-CR');
    }

    function analizarArchivoNativo(event) {
        const archivo = event.target.files[0];
        if (!archivo) return;

        const loader = document.getElementById('loaderGlobal');
        const statusDiv = document.getElementById('statusIA');
        const cantidadInput = document.getElementById('cantidad');
        const tipoSelect = document.getElementById('tipoImpresion');
        const nombreArchivo = archivo.name.toLowerCase();

        loader.classList.add('active');

        // PDFs nativos
        if (nombreArchivo.endsWith('.pdf')) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const arr = new Uint8Array(e.target.result);
                let cont = 0;
                for (let i = 0; i < arr.length - 7; i++) {
                    if (arr[i] === 47 && arr[i+1] === 84 && arr[i+2] === 121 && arr[i+3] === 112 && arr[i+4] === 101 && arr[i+5] === 47 && arr[i+6] === 80 && arr[i+7] === 97) { 
                        cont++;
                    }
                }
                actualizarFormulario(cont || 1, "bn");
            };
            reader.readAsArrayBuffer(archivo);
            return;
        }

        // 🎯 Imágenes: Ahora se configuran por defecto como "A Color" (₡150)
        if (nombreArchivo.match(/\.(jpg|jpeg|png)$/)) {
            actualizarFormulario(1, "color");
            return;
        }

        // Formatos de Microsoft Office con JSZip
        if (nombreArchivo.endsWith('.docx') || nombreArchivo.endsWith('.pptx') || nombreArchivo.endsWith('.xlsx')) {
            JSZip.loadAsync(archivo).then(function(zip) {
                const appXmlFile = zip.file("docProps/app.xml");
                
                if (appXmlFile) {
                    appXmlFile.async("string").then(function(xmlText) {
                        let paginas = 1;
                        let tipo = "bn";

                        if (nombreArchivo.endsWith('.docx')) {
                            let match = xmlText.match(/<Pages>(\d+)<\/Pages>/);
                            paginas = match ? parseInt(match[1], 10) : 1;
                            tipo = "bn";
                        } 
                        else if (nombreArchivo.endsWith('.pptx')) {
                            let match = xmlText.match(/<Slides>(\d+)<\/Slides>/);
                            paginas = match ? parseInt(match[1], 10) : 1;
                            tipo = "color";
                        } 
                        else if (nombreArchivo.endsWith('.xlsx')) {
                            let matches = xmlText.match(/<TitlesOfParts>([\s\S]*?)<\/TitlesOfParts>/);
                            if (matches) {
                                let lines = matches[1].match(/<vt:lpstr>/g);
                                paginas = lines ? lines.length : 1;
                            }
                            tipo = "bn";
                        }

                        actualizarFormulario(paginas, tipo);
                    });
                } else {
                    actualizarFormulario(1, nombreArchivo.endsWith('.pptx') ? "color" : "bn");
                }
            }).catch(function(err) {
                console.error("Error al procesar el zip de Office:", err);
                actualizarFormulario(1, "bn");
            });
            return;
        }

        actualizarFormulario(1, "bn");

        function actualizarFormulario(paginas, tipo) {
            cantidadInput.value = paginas;
            tipoSelect.value = tipo;

            // 🔒 Bloqueamos estos campos para que no se puedan editar manualmente
            cantidadInput.disabled = true;
            tipoSelect.disabled = true;

            statusDiv.style.display = "block";
            statusDiv.textContent = `🤖 Lectura de IA completada: ${paginas} pág. detectadas con éxito.`;
            document.getElementById('labelCotizacion').textContent = "Monto Cotizado por IA:";

            cantidadInput.disabled = true;
            tipoSelect.disabled = true;

            calcularCotizacion();
            loader.classList.remove('active');
        }
    }

    // 🎯 Permite arrastrar el botón flotante a cualquier parte de la pantalla
    (function habilitarArrastre() {
        const btn = document.getElementById('btnAudioBienvenida');
        let arrastrando = false;
        let movido = false;
        let offsetX = 0, offsetY = 0;

        // Restaura la última posición guardada (si existe)
        try {
            const posGuardada = JSON.parse(localStorage.getItem('posBotonAudio'));
            if (posGuardada) {
                btn.style.left = posGuardada.left;
                btn.style.top = posGuardada.top;
                btn.style.right = "auto";
                btn.style.bottom = "auto";
            }
        } catch(e) {}

        function iniciar(clientX, clientY) {
            arrastrando = true;
            movido = false;
            const rect = btn.getBoundingClientRect();
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
            btn.classList.add('arrastrando');
        }

        function mover(clientX, clientY) {
            if (!arrastrando) return;
            movido = true;

            let nuevoLeft = clientX - offsetX;
            let nuevoTop = clientY - offsetY;

            const maxLeft = window.innerWidth - btn.offsetWidth;
            const maxTop = window.innerHeight - btn.offsetHeight;
            nuevoLeft = Math.max(0, Math.min(nuevoLeft, maxLeft));
            nuevoTop = Math.max(0, Math.min(nuevoTop, maxTop));

            btn.style.left = nuevoLeft + "px";
            btn.style.top = nuevoTop + "px";
            btn.style.right = "auto";
            btn.style.bottom = "auto";
        }

        function soltar() {
            if (!arrastrando) return;
            arrastrando = false;
            btn.classList.remove('arrastrando');

            try {
                localStorage.setItem('posBotonAudio', JSON.stringify({ left: btn.style.left, top: btn.style.top }));
            } catch(e) {}
        }

        // Mouse
        btn.addEventListener('mousedown', e => { iniciar(e.clientX, e.clientY); e.preventDefault(); });
        window.addEventListener('mousemove', e => mover(e.clientX, e.clientY));
        window.addEventListener('mouseup', soltar);

        // Touch (celulares)
        btn.addEventListener('touchstart', e => {
            const t = e.touches[0];
            iniciar(t.clientX, t.clientY);
        }, { passive: true });

        window.addEventListener('touchmove', e => {
            if (!arrastrando) return;
            const t = e.touches[0];
            mover(t.clientX, t.clientY);
        }, { passive: true });

        window.addEventListener('touchend', soltar);

        // Si el botón se movió, no disparamos el audio al soltar (era un arrastre, no un toque)
        btn.addEventListener('click', function(e) {
            if (movido) {
                movido = false;
                return;
            }
            reproducirBienvenida();
        });
    })();

    function reproducirBienvenida() {
        if (!('speechSynthesis' in window)) {
            alert("Tu navegador no soporta audio de voz, pero podés seguir usando la app sin problema.");
            return;
        }

        window.speechSynthesis.cancel();

        const mensaje = "¡Hola! Bienvenido a Pedir Impresiones en Línea. " +
            "Aquí podés enviar tu documento para imprimirlo sin hacer fila. " +
            "Primero escribí tu nombre completo. " +
            "Después cargá tu archivo, puede ser un PDF, un Word, un Excel, un PowerPoint o una foto, " +
            "y el sistema va a calcular automáticamente cuántas páginas tiene y el precio. " +
            "Si querés, también podés escribir manualmente cuántas páginas son y elegir si es blanco y negro o a color. " +
            "Cuando estés listo, presioná el botón verde que dice Enviar Pedido Digital, " +
            "y tu orden va a llegar directo a la pantalla del taller para que la preparen. " +
            "Cuando llegués, solo tenés que pagar el monto que se mostró aquí.";

        const utterancia = new SpeechSynthesisUtterance(mensaje);
        utterancia.lang = "es-ES";
        utterancia.rate = 1;

        const voces = window.speechSynthesis.getVoices();
        const vozEspanol = voces.find(v => v.lang && v.lang.toLowerCase().startsWith('es'));
        if (vozEspanol) utterancia.voice = vozEspanol;

        const btn = document.getElementById('btnAudioBienvenida');
        btn.classList.add('hablando');
        btn.textContent = "🔈";

        utterancia.onend = function() {
            btn.classList.remove('hablando');
            btn.textContent = "🔊";
        };

        window.speechSynthesis.speak(utterancia);
    }

    // Intenta reproducir el saludo automáticamente al entrar.
    // Algunos navegadores bloquean el audio sin interacción, por eso queda el botón como respaldo.
    window.addEventListener('load', function() {
        setTimeout(function() {
            try { reproducirBienvenida(); } catch(e) { console.log("Autoplay de bienvenida bloqueado por el navegador."); }
        }, 600);
    });

    function enviarPedidoALaNube() {
        const cantidadHojas = document.getElementById('cantidad').value;

        if (!cantidadHojas || parseFloat(cantidadHojas) <= 0) {
            alert("Por favor indicá cuántas páginas necesitás imprimir (debe ser mayor a 0).");
            return;
        }

        const btn = document.getElementById('btnEnviar');
        btn.textContent = "⏳ Enviando pedido...";
        btn.disabled = true;

        const tipo = document.getElementById('tipoImpresion').value;
        const nombreCliente = document.getElementById('cliente').value;
        const horaActual = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}/latest`, {
            method: 'GET',
            headers: { 'X-Master-Key': JSONBIN_CONFIG.apiKey }
        })
        .then(res => res.json())
        .then(data => {
            let pedidosActuales = Array.isArray(data.record) ? data.record : [];

            const nuevoPedido = {
                id: Math.floor(1000 + Math.random() * 9000).toString(),
                cliente: nombreCliente,
                hora: horaActual,
                cantidad: cantidadHojas,
                tipoLabel: TARIFAS[tipo].label, 
                total: totalGlobal,
                estado: "Pendiente"
            };

            pedidosActuales.push(nuevoPedido);

            return fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-Master-Key': JSONBIN_CONFIG.apiKey 
                },
                body: JSON.stringify(pedidosActuales)
            });
        })
        .then(res => {
            if(res.ok) {
                alert("¡Pedido enviado con éxito! Tu orden ya está en la pantalla del taller.");
                document.getElementById('formPedido').reset();
                document.getElementById('statusIA').style.display = "none";
                document.getElementById('labelCotizacion').textContent = "Monto Estimado a Pagar:";
                document.getElementById('cantidad').disabled = false;
                document.getElementById('tipoImpresion').disabled = false;
                calcularCotizacion();
            } else {
                alert("Hubo un problema al guardar el pedido.");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Error de conexión al enviar el pedido.");
        })
        .finally(() => {
            btn.textContent = "🚀 Enviar Pedido Digital";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
